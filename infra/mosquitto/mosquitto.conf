# =====================================================
# Konfiguracja Mosquitto dla środowiska lokalnego
# =====================================================
# Bez TLS i bez autoryzacji - tylko do dev/testów.
# Produkcyjna konfiguracja z certyfikatami klienckimi
# i ACL per temat przyjdzie w sierpniu.
# =====================================================

listener 1883 0.0.0.0
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
