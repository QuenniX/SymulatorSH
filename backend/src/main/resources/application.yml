spring:
  application:
    name: smart-home-platform
  profiles:
    active: local
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    pl.smarthome.platform: DEBUG
    org.eclipse.paho: WARN
    com.influxdb: WARN

# Konfiguracja platformy
platform:
  executor:
    pool-size: 3
  mqtt:
    broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
    client-id-prefix: smart-home-backend
    qos: 1
  influx:
    url: ${INFLUX_URL}
    org: ${INFLUX_ORG}
    bucket: ${INFLUX_BUCKET}
    token: ${INFLUX_TOKEN}
